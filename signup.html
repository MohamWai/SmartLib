    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h1 class="display-6 fw-bold section-title mb-2">Create an account</h1>
          <p class="text-secondary mb-4">
            Registration form submits to
            <a href="https://httpbin.org" class="link-primary">httpbin.org</a> for demo
            purposes.
          </p>

          <div class="card feature-card p-4 p-md-5">
            <h2 class="h4 fw-semibold section-title mb-3">Form #3 — Registration</h2>
            <form id="form-3" action="https://httpbin.org/post" method="post">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="reg-first" class="form-label">First name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="reg-first"
                    name="first_name"
                    required
                    autocomplete="given-name"
                  />
                </div>
                <div class="col-md-6">
                  <label for="reg-last" class="form-label">Last name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="reg-last"
                    name="last_name"
                    required
                    autocomplete="family-name"
                  />
                </div>
                <div class="col-12">
                  <label for="reg-email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="reg-email"
                    name="email"
                    required
                    autocomplete="email"
                    placeholder="you@university.edu"
                  />
                </div>
                <div class="col-md-6">
                  <label for="reg-password" class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="reg-password"
                    name="password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                  />
                </div>
                <div class="col-md-6">
                  <label for="reg-password2" class="form-label">Confirm password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="reg-password2"
                    name="password_confirm"
                    required
                    minlength="8"
                    autocomplete="new-password"
                  />
                </div>
                <div class="col-12">
                  <fieldset>
                    <legend class="form-label mb-2">Patron type</legend>
                    <div class="d-flex flex-wrap gap-4">
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="patron_type"
                          id="patron-student"
                          value="student"
                          checked
                        />
                        <label class="form-check-label" for="patron-student">Student</label>
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="patron_type"
                          id="patron-faculty"
                          value="faculty"
                        />
                        <label class="form-check-label" for="patron-faculty">Faculty</label>
                      </div>
                    </div>
                  </fieldset>
                </div>
              </div>
              <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4" style="background-color: rgb(0, 54, 82); border-color: rgb(0, 54, 82);">
                  Register
                </button>
              </div>
            </form>
          </div>
