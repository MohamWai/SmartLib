<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartLib - Contact Us</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      
      <div
        class="d-block w-100 justify-content-center justify-content-between align-items-center"
      >
        
        <div class="text-center feature-card">
          <h1 class="text-center">
            Write down the <span class="text-success">correct</span> sentence for these words bellow
          </h1>
          <button
            id="startGame"
            class="btn btn-warning col m-3"
            onclick="startGame()"
          >
            Start Game
          </button>
          <a href="./index.html" class="btn btn-warning col m-3">Back to Home</a>
          <br />
          <div id="q_num"></div>
        </div>
        <div class="text-center feature-card" id="wordsContainer">
          <!-- here the words appear -->
        </div>
        <br />
        <div class="card feature-card col">
          <textarea
            class="row m-3"
            name=""
            id="answer_area"
            placeholder="your answer is..."
          ></textarea>
          <button class="btn btn-primary row m-3" onclick="checkAns()">
            check your answer
          </button>
        </div>

        <div id="feadback"></div>

        <div class="row m-3">
          <button class="btn btn-success col m-3" onclick="startGame()">Reset</button>
          <button class="btn btn-success col m-3" id="next" onclick="nextQuestion()">
            Next
          </button>
        </div>
      </div>
    </div>

    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
        <footer class="bg-primary text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="small mb-0">
          <a href="about.html" class="link-light link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">About</a>
          <span class="text-white text-opacity-50 mx-2 user-select-none" aria-hidden="true">·</span>
          <a href="contact.html" class="link-light link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Contact</a>
          <span class="text-white text-opacity-50 mx-2 user-select-none" aria-hidden="true">·</span>
          © 2026 SmartLib Management. All rights reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
