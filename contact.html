<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartLib - Contact Us</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-style navbar-dark">
      <div class="container">
        <a href="index.html" class="navbar-brand">
          <img src="./assets/SmartLib_logo.jpg" alt="Logo" width="40" height="30" class="d-inline-block align-text-top" />
          SmartLib</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="search.html" class="nav-link">Search</a></li>
            <li class="nav-item"><a href="reports.html" class="nav-link">Reports</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link active">Contact Us</a></li>
          </ul>
          <form class="d-flex" role="search" action="search.html" method="get">
            <input class="form-control me-2" type="search" name="q" placeholder="Search" aria-label="Search" />
            <button class="btn btn-outline-light" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="d-flex justify-content-center justify-content-between align-items-center vh-100"
      >
        <div>
        <h1>We Are Happy For Your <span style="color: rgb(50, 192, 116);">Contact</span> </h1>
        <p>Please complete this form for any question <br>
        or any message you want to ask.</p>
      </div>
      <div
        class="card w-50 feature-card contact align-items-center justify-content-center pt-4"
        id="contact-form"
      >
        <h1>Contact Us</h1>
        <hr
          style="
            height: 2px;
            border-width: 0;
            color: rgb(103, 174, 241);
            background-color: rgb(83, 148, 190);
          "
        />
        <form class="container p-4 pt-0" action="https://httpbin.org/get" method="get">
          <div class="row">
            <div class="mb-3 col-lg">
              <label for="first-name" class="form-label">First Name: </label>
              <input type="text" class="form-control" id="first-name" name="first-name" />
            </div>
            <div class="mb-3 col-lg">
              <label for="last-name" class="form-label">Last Name:</label>
              <input type="text" class="form-control" id="last-name" name="last-name" />
            </div>
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label"
              >Email address</label
            >
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              name="email"
              aria-describedby="emailHelp"
            />
            <div id="emailHelp" class="form-text">
              We'll never share your email with anyone else.
            </div>
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="4"
              aria-label="Message"
              placeholder="Your message..."
            ></textarea>
          </div>
          <button type="submit" class="btn text-light" style="background-color: rgb(0, 54, 82);">Submit</button>
        </form>
      </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
