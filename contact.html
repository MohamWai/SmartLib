<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartLib</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="d-flex justify-content-center justify-content-between align-items-center vh-100"
      >
        <div>
        <h1>We Are Happy For Your <span style="color: rgb(50, 192, 116);">Contact</span> </h1>
        <p>Please complete this form for any question <br>
        or any massage you want to ask.</p>
      </div>
      <div
        class="card w-50 feature-card contact align-items-center justify-content-center pt-4"
        id="contact-form"
      >
        <h1>Contact Us</h1>
        <hr
          style="
            height: 2px;
            border-width: 0;
            color: rgb(103, 174, 241);
            background-color: rgb(83, 148, 190);
          "
        />
        <form class="container p-4 pt-0" >
          <div class="row">
            <div class="mb-3 col-lg">
              <label for="FristName" class="form-label">Frist Name: </label>
              <input type="text" class="form-control" id="frist-name" />
            </div>
            <div class="mb-3 col-lg">
              <label for="exampleInputPassword1" class="form-label"
                >Last Name:
              </label>
              <input type="text" class="form-control" id="last-name" />
            </div>
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label"
              >Email address</label
            >
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
            />
            <div id="emailHelp" class="form-text">
              We'll never share your email with anyone else.
            </div>
          </div>
          <div class="mb-3">
            <label for="massage" class="form-label">Massage</label>
            <div class="input-group">
              <span class="input-group-text">With textarea</span>
              <textarea
                class="form-control"
                aria-label="With textarea"
              ></textarea>
            </div>
          </div>
          <button type="submit" class="btn text-light" style="background-color: rgb(0, 54, 82);">Submit</button>
        </form>
      </div>
    </div>
    </div>
    

  </body>
</html>
