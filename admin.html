<div class="container my-4">

<h2 class="text-center mb-4">Admin Dashboard</h2>

<!-- EXISTING ADMIN FEATURE (UPLOAD / FORM) -->
<div class="card p-3 mb-4">
    <h5 class="mb-3">Add New Book (Upload)</h5>

    <input id="uTitle" class="form-control mb-1" placeholder="Book Title">
    <div id="uTitleError" class="text-danger mb-2"></div>

    <input id="uAuthor" class="form-control mb-1" placeholder="Author">
    <div id="uAuthorError" class="text-danger mb-2"></div>

    <textarea id="uSummary" class="form-control mb-1" placeholder="Book Summary"></textarea>
    <div id="uSummaryError" class="text-danger mb-2"></div>

    <input id="uFile" type="file" class="form-control mb-2">
    <div id="uFileError" class="text-danger mb-2"></div>

    <button id="uploadBtn" class="btn btn-secondary w-100">
        Upload Book
    </button>
</div>


<div class="row">

<!-- BOOK MANAGEMENT -->
<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="text-center mb-3">Manage Books</h5>

        <input id="pName" class="form-control mb-1" placeholder="Book Name">
        <div id="pNameError" class="text-danger mb-2"></div>

        <input id="pPrice" type="number" class="form-control mb-1" placeholder="Price">
        <div id="pPriceError" class="text-danger mb-2"></div>

        <input id="pCat" class="form-control mb-1" placeholder="Category">
        <div id="pCatError" class="text-danger mb-2"></div>

        <button id="addProductBtn" class="btn btn-primary w-100 mb-3">
            Add Book
        </button>

        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>
    </div>
</div>

<!-- USER MANAGEMENT -->
<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="text-center mb-3">Manage Users</h5>

        <input id="sName" class="form-control mb-1" placeholder="User Name">
        <div id="sNameError" class="text-danger mb-2"></div>

        <input id="sAge" type="number" class="form-control mb-1" placeholder="Age">
        <div id="sAgeError" class="text-danger mb-2"></div>

        <input id="sMajor" class="form-control mb-1" placeholder="Role">
        <div id="sMajorError" class="text-danger mb-2"></div>

        <button id="addStudentBtn" class="btn btn-success w-100 mb-3">
            Add User
        </button>

        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>
</div>

</div>
</div>
