<div class="container my-4">

<h2 class="text-center mb-4 fw-bold">Admin Dashboard</h2>

<!-- ADD NEW BOOK -->
<div class="card p-4 shadow mb-4">
    <h5 class="mb-3 fw-bold text-center">Add New Book (Upload)</h5>

    <input id="uTitle" class="form-control mb-2" placeholder="Book Title">
    <div id="uTitleError" class="text-danger mb-2"></div>

    <input id="uAuthor" class="form-control mb-2" placeholder="Author">
    <div id="uAuthorError" class="text-danger mb-2"></div>

    <textarea id="uSummary" class="form-control mb-2" placeholder="Book Summary"></textarea>
    <div id="uSummaryError" class="text-danger mb-2"></div>

    <input id="uFile" type="file" class="form-control mb-3">
    <div id="uFileError" class="text-danger mb-2"></div>

    <button id="uploadBtn" class="btn btn-secondary w-100">
        Upload Book
    </button>
</div>

<div class="row">


<div class="col-md-6">
    <div class="card p-4 shadow mb-4">
        <h5 class="text-center mb-3 fw-bold">Manage Books</h5>

        <input id="pName" class="form-control mb-2" placeholder="Book Name">
        <input id="pPrice" type="number" class="form-control mb-2" placeholder="Price">
        <input id="pCat" class="form-control mb-2" placeholder="Category">

        <button id="addProductBtn" class="btn btn-primary w-100 mb-3">
            Add Book
        </button>

        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>
    </div>
</div>


<div class="col-md-6">
    <div class="card p-4 shadow mb-4">
        <h5 class="text-center mb-3 fw-bold">Manage Users</h5>

        <input id="sName" class="form-control mb-2" placeholder="User Name">
        <input id="sAge" type="number" class="form-control mb-2" placeholder="Age">
        <input id="sMajor" class="form-control mb-2" placeholder="Role">

        <button id="addStudentBtn" class="btn btn-success w-100 mb-3">
            Add User
        </button>

        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>
</div>
