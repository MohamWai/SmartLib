<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartLib - Admin Panel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="admin-page">
    <nav class="navbar navbar-expand-lg navbar-style navbar-dark">
      <div class="container">
        <a href="index.html" class="navbar-brand">
          <img src="./assets/SmartLib_logo.jpg" alt="Logo" width="40" height="30" class="d-inline-block align-text-top" />
          SmartLib</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="search.html" class="nav-link">Search</a></li>
            <li class="nav-item"><a href="reports.html" class="nav-link">Reports</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link">Contact Us</a></li>
            <li class="nav-item"><a href="signup.html" class="nav-link">Sign up</a></li>
            <li class="nav-item"><a href="account.html" class="nav-link">Account</a></li>
            <li class="nav-item"><a href="admin.html" class="nav-link active">Admin</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <h1 class="h2 text-center mb-4 section-title fw-bold">Admin Panel</h1>
              <p class="text-secondary text-center small mb-4">Add a new title to the catalog (demo form).</p>
              <form
                action="https://httpbin.org/post"
                method="post"
                enctype="multipart/form-data"
              >
                <div class="mb-3">
                  <label class="form-label" for="book-title">Book title</label>
                  <input type="text" class="form-control" id="book-title" name="book-title" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="author">Author</label>
                  <input type="text" class="form-control" id="author" name="author" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="summary">Summary</label>
                  <textarea class="form-control" id="summary" name="summary" rows="3"></textarea>
                </div>
                <div class="mb-4">
                  <label class="form-label" for="cover-image">Cover image</label>
                  <input type="file" class="form-control" id="cover-image" name="cover-image" accept="image/*" />
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-brand btn-lg">Add book</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-white py-3" style="background-color: rgb(0, 54, 82);">
      <div class="container text-center">
        <p class="small mb-0">
          <a href="about.html" class="text-white text-decoration-none">About</a>
          &nbsp;·&nbsp;
          <a href="contact.html" class="text-white text-decoration-none">Contact</a>
          &nbsp;·&nbsp;
          © 2025 Smart Lib Management. All rights reserved.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
